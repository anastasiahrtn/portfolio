<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Site Title -->
    <title>AnastasiaHrtn | Home </title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="00.assets\00.icon_logo\site_icon.png">

    <!-- Connect CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- home animation -->
    <div class="face-container">
        <div class="face">
            <img src="00.assets\01.home_animation\eyeanimation001.png" alt="cat" class="face" id="cat-face">
        

            <img src="00.assets\01.home_animation\eyeanimationleft.png" class="eye left-eye">
            <img src="00.assets\01.home_animation\eyeanimationright.png" class="eye right-eye">

        </div>
        
        <div class="useless_quote" id="quote"></div>
    </div>


    <header>

        <a href="home.html">
            <img src="00.assets/00.icon_logo/white_logo.png"
                alt="logo"
                class="header_logo">
        </a>

        <!-- hamburger -->
        <button class="menu-toggle" onclick="toggleMenu()">
            ☰
        </button>

        <!-- nav -->
        <div class="nav-buttons-container" id="mobileMenu">
            <a href="profile.html" class="nav-buttons">Profile</a>
            <a href="updates.html" class="nav-buttons">Updates</a>
            <a href="projects.html" class="nav-buttons">Projects</a>
            <a href="contact.html" class="nav-buttons">Contact</a>
        </div>

    </header>
    
    <div class="content-home">
        <div class="banners">

            <div class="banner-slider" id="banner-slider">

                <a href="" class="banner-slide">
                    <img src="00.assets/02.banners/banners-01.png" alt="Banner 1">
                </a>

                <a href="" class="banner-slide">
                    <img src="00.assets/02.banners/banners-02.png" alt="Banner 2">
                </a>

                <a href="profile.html" class="banner-slide">
                    <img src="00.assets/02.banners/banners-03.png" alt="Banner 3">
                </a>

                <a href="updates.html" class="banner-slide">
                    <img src="00.assets/02.banners/banners-04.png" alt="Banner 4">
                </a>

                <a href="projects.html" class="banner-slide">
                    <img src="00.assets/02.banners/banners-05.png" alt="Banner 5">
                </a>

                <a href="contact.html" class="banner-slide">
                    <img src="00.assets/02.banners/banners-06.png" alt="Banner 6">
                </a>

            </div>

            <button class="banner-btn prev">&#10094;</button>
            <button class="banner-btn next">&#10095;</button>

        </div>

    </div>



    <footer class="footer">
        © 2026 Anastasia Putri Hartanti. All Rights Reserved.
    </footer>


    <script>
        // eye tracking
        const eyes = document.querySelectorAll('.eye');

        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();

                // center of the eye
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                // distance from cursor to eye center
                const deltaX = e.clientX - eyeX;
                const deltaY = e.clientY - eyeY;

                // angle toward cursor
                const angle = Math.atan2(deltaY, deltaX);

                // limit how far eyes can move
                const maxMove = 10;

                const moveX = Math.cos(angle) * maxMove;
                const moveY = Math.sin(angle) * maxMove;

                eye.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        document.addEventListener('mouseleave', () => {
            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(eye => {
                eye.style.transform = 'translate(0px, 0px)';
            });
        });

        // BLINK
        const catFace = document.getElementById("cat-face");

        setInterval(() => {
            // switch to blink image
            catFace.src = "00.assets/01.home_animation/eyeanimation002.png";

            // after 0.3s, switch back
            setTimeout(() => {
                catFace.src = "00.assets/01.home_animation/eyeanimation001.png";
            }, 250);

        }, 3000);


        const quotes = [
            "Scientifically proven: scrolling increases chances of finding something interesting.",
            "Legends say the real stuff starts after this… keep scrolling.",
            "Nothing here? Bold assumption. Try scrolling.",
            "If this were the important part, I wouldn’t tell you to scroll.",
            "The cat is just the opening act. Scroll for the main event."
        ];

        // pick random quote
        const randomIndex = Math.floor(Math.random() * quotes.length);
        const selectedQuote = quotes[randomIndex];

        // insert into div
        document.getElementById("quote").textContent = selectedQuote;


        // scroll lock 
        const faceContainer = document.querySelector('.face-container');

        // Check if already removed in this session
        if (sessionStorage.getItem("faceRemoved") === "true") {
            faceContainer?.remove();
        } else {
            let removed = false;

            window.addEventListener("scroll", () => {
                if (!removed && window.scrollY >= window.innerHeight) {
                    faceContainer?.remove();
                    removed = true;

                    // Save state for the session
                    sessionStorage.setItem("faceRemoved", "true");
                }
            });
        }


        function toggleMenu() {
            document
                .getElementById("mobileMenu")
                .classList.toggle("active");
        }



        // banner slider
        const slider = document.getElementById("banner-slider");

        const nextBtn = document.querySelector(".next");
        const prevBtn = document.querySelector(".prev");

        const totalSlides = document.querySelectorAll(".banner-slide").length;

        let currentSlide = 0;

        function updateSlider() {
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function nextSlide() {
            currentSlide++;

            if (currentSlide >= totalSlides) {
                currentSlide = 0;
            }

            updateSlider();
        }

        function prevSlide() {
            currentSlide--;

            if (currentSlide < 0) {
                currentSlide = totalSlides - 1;
            }

            updateSlider();
        }

        nextBtn.addEventListener("click", nextSlide);
        prevBtn.addEventListener("click", prevSlide);

        /* auto slide every 5 sec */
        setInterval(nextSlide, 7000);
    </script>

</body>
</html>
